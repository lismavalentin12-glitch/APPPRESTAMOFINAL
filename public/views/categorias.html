<div class="page-header">
  <div>
    <h1 class="page-title">Categorías</h1>
    <p class="page-subtitle">Organiza las herramientas por categorías</p>
  </div>
  <button class="btn-primary-action" id="btnNuevaCategoria">
    <i class="bi bi-plus-lg"></i> Nueva Categoría
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input type="text" id="searchCategoria" class="search-input" placeholder="Buscar categoría…" />
  </div>
  <button class="btn-icon-outline" id="btnRefreshCategorias" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr><th>#</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr>
      </thead>
      <tbody id="bodyCategorias">
        <tr><td colspan="4" class="text-center py-5"><div class="spinner-custom"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="table-footer">
    <span class="text-muted text-sm" id="totalCategoriasLabel">Cargando…</span>
  </div>
</div>

<div class="modal-overlay" id="modalCategoriaOverlay">
  <div class="modal-panel modal-sm">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalCategoriaTitle">Nueva Categoría</div>
        <div class="modal-subtitle" id="modalCategoriaSubtitle">Completa los campos</div>
      </div>
      <button class="btn-modal-close" id="btnCloseModalCategoria"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body-custom">
      <input type="hidden" id="categoriaId" />
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label-custom">Nombre <span class="required">*</span></label>
          <input type="text" id="cNombre" class="input-custom" placeholder="Ej: Herramientas Manuales" maxlength="100" />
          <div class="field-error" id="err-cNombre"></div>
        </div>
        <div class="col-12">
          <label class="form-label-custom">Descripción</label>
          <textarea id="cDescripcion" class="input-custom" rows="3" placeholder="Descripción de la categoría…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelCategoria">Cancelar</button>
      <button class="btn-save" id="btnSaveCategoria">
        <span id="btnSaveCText"><i class="bi bi-check-lg me-1"></i> Guardar</span>
        <span id="btnSaveCSpinner" class="d-none"><div class="spinner-sm"></div></span>
      </button>
    </div>
  </div>
</div>
