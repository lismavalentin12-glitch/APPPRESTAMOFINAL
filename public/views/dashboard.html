<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Resumen general del sistema de préstamo de herramientas</p>
  </div>
</div>

<div class="row g-3 mb-4">
  <div class="col-md-3 col-sm-6">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(99,102,241,.1);color:#6366f1"><i class="bi bi-wrench-adjustable"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="statHerramientas">—</div>
        <div class="stat-label">Total Herramientas</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(16,185,129,.1);color:#10b981"><i class="bi bi-check-circle-fill"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="statDisponibles">—</div>
        <div class="stat-label">Disponibles</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(245,158,11,.1);color:#f59e0b"><i class="bi bi-arrow-left-right"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="statActivos">—</div>
        <div class="stat-label">Préstamos Activos</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(239,68,68,.1);color:#ef4444"><i class="bi bi-clock-history"></i></div>
      <div class="stat-info">
        <div class="stat-value" id="statAtrasados">—</div>
        <div class="stat-label">Atrasados</div>
      </div>
    </div>
  </div>
</div>

<div class="card-panel">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0" style="font-weight:600;font-size:15px"><i class="bi bi-clock-history me-2 text-primary"></i>Últimos Préstamos</h5>
  </div>
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Usuario</th>
          <th>Herramienta</th>
          <th>Fecha Salida</th>
          <th>Devolución Esperada</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="bodyDashboard">
        <tr><td colspan="6" class="text-center py-4"><div class="spinner-custom"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
