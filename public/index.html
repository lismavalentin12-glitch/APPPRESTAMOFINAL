<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Préstamo Herramientas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-tools"></i></div>
      <div>
        <div class="brand-name">HerramiPrest</div>
        <div class="brand-sub">Sistema de Préstamos</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a href="#" class="nav-item active" data-page="dashboard">
        <i class="bi bi-grid-1x2-fill"></i>
        <span>Dashboard</span>
      </a>

      <div class="nav-section-label">Inventario</div>
      <a href="#" class="nav-item" data-page="herramientas">
        <i class="bi bi-wrench-adjustable"></i>
        <span>Herramientas</span>
        <span class="nav-badge" id="badge-herramientas">0</span>
      </a>
      <a href="#" class="nav-item" data-page="categorias">
        <i class="bi bi-tags-fill"></i>
        <span>Categorías</span>
        <span class="nav-badge" id="badge-categorias">0</span>
      </a>

      <div class="nav-section-label">Operaciones</div>
      <a href="#" class="nav-item" data-page="prestamos">
        <i class="bi bi-arrow-left-right"></i>
        <span>Préstamos</span>
        <span class="nav-badge" id="badge-prestamos">0</span>
      </a>
      <a href="#" class="nav-item" data-page="devoluciones">
        <i class="bi bi-arrow-return-left"></i>
        <span>Devoluciones</span>
        <span class="nav-badge" id="badge-devoluciones">0</span>
      </a>

      <div class="nav-section-label">Administración</div>
      <a href="#" class="nav-item" data-page="usuarios">
        <i class="bi bi-people-fill"></i>
        <span>Usuarios</span>
        <span class="nav-badge" id="badge-usuarios">0</span>
      </a>
      <a href="#" class="nav-item" data-page="proveedores">
        <i class="bi bi-truck"></i>
        <span>Proveedores</span>
        <span class="nav-badge" id="badge-proveedores">0</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="d-flex align-items-center gap-2">
        <div class="avatar-xs"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="fw-600 text-sm">Administrador</div>
          <div class="text-muted" style="font-size:11px">Sistema v1.0</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">
    <header class="topbar">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar">
        <i class="bi bi-list"></i>
      </button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-actions">
        <div class="status-dot"></div>
        <span class="text-sm text-muted">Conectado</span>
      </div>
    </header>

    <div class="page-wrapper" id="pageContainer">
      <div class="d-flex justify-content-center align-items-center" style="height:60vh">
        <div class="spinner-custom"></div>
      </div>
    </div>
  </main>

  <div id="modalsContainer"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/herramientas.js"></script>
  <script src="js/modules/categorias.js"></script>
  <script src="js/modules/prestamos.js"></script>
  <script src="js/modules/devoluciones.js"></script>
  <script src="js/modules/usuarios.js"></script>
  <script src="js/modules/proveedores.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
